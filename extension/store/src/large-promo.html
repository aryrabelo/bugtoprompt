<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 920px; height: 680px;
    font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", sans-serif;
    background: linear-gradient(160deg, #4f46e5 0%, #4338ca 45%, #1e1b4b 100%);
    overflow: hidden;
  }
  .stage {
    position: relative;
    width: 920px; height: 680px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
  }
  .glow-a {
    position: absolute; width: 520px; height: 520px;
    top: -180px; left: -160px;
    background: radial-gradient(circle, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0) 70%);
  }
  .glow-b {
    position: absolute; width: 460px; height: 460px;
    bottom: -180px; right: -140px;
    background: radial-gradient(circle, rgba(129,140,248,0.35) 0%, rgba(129,140,248,0) 70%);
  }
  .mark {
    width: 96px; height: 96px;
    border-radius: 24px;
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.28);
    display: flex; align-items: center; justify-content: center;
  }
  .mark svg { width: 52px; height: 52px; }
  .wordmark {
    color: #ffffff;
    font-size: 46px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .tagline {
    color: rgba(255,255,255,0.86);
    font-size: 21px;
    font-weight: 500;
    text-align: center;
    max-width: 620px;
    line-height: 1.45;
  }
  .pills {
    display: flex;
    gap: 12px;
    margin-top: 6px;
  }
  .pill {
    padding: 9px 18px;
    border-radius: 999px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.24);
    color: #ffffff;
    font-size: 14px;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="glow-a"></div>
    <div class="glow-b"></div>
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" role="img" aria-labelledby="logo-title-promo"><title id="logo-title-promo">BugToPrompt logo</title>
        <circle cx="12" cy="12" r="9"></circle>
        <path d="M9 12l2 2 4-4"></path>
      </svg>
    </div>
    <div class="wordmark">BugToPrompt</div>
    <div class="tagline">Capture a bug, get a prompt your AI agent can fix — voice transcript, click timeline, and screenshots, in GitHub-issue format.</div>
    <div class="pills">
      <div class="pill">Numbered click capture</div>
      <div class="pill">Voice narration</div>
      <div class="pill">One-click GitHub issue</div>
    </div>
  </div>
</body>
</html>
